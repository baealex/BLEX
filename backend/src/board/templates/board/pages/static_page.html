{% extends 'board/base.html' %}
{% load static %}
{% load island %}

{% block title %}{{ page.title }} - BLEX{% endblock %}

{% block meta %}
<meta name="description" content="{{ meta_description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ canonical_url }}">
<meta property="og:title" content="{{ seo_title }}">
<meta property="og:description" content="{{ meta_description }}">
<meta property="twitter:card" content="summary">
<meta property="twitter:url" content="{{ canonical_url }}">
<meta property="twitter:title" content="{{ seo_title }}">
<meta property="twitter:description" content="{{ meta_description }}">
<link rel="canonical" href="{{ canonical_url }}">
<link rel="alternate" type="text/markdown" href="{{ static_page_markdown_url }}">
{% endblock %}

{% block extra_styles %}
<link rel="stylesheet" href="{% island_css 'styles/post.scss' %}">
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 md:px-6 py-8">
    <div class="prose prose-lg max-w-none blog-post-content break-words">
        {{ page.content|safe }}
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script type="application/ld+json">{{ structured_data_json|safe }}</script>
{% endblock %}
