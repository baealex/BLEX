<!-- Article Header -->
<div class="post-cover-none mb-12 sm:mb-16">
    {% include 'board/posts/covers/_series_badge.html' with cover_inverted=False %}

    <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-content {% if not post.subtitle %}mb-8{% else %}mb-3{% endif %} leading-tight break-words" itemprop="headline">
        {{ post.title }}
    </h1>
    {% if post.subtitle %}
    <p class="text-lg sm:text-xl text-content-secondary mb-8 leading-relaxed font-medium">
        {{ post.subtitle }}
    </p>
    {% endif %}

    {% include 'board/posts/covers/_post_meta.html' with cover_inverted=False cover_meta_border=True %}
</div>
