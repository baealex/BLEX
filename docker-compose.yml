version: "2.1"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-blex}
      POSTGRES_USER: ${DB_USER:-blex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blex}
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: baealex/blex-backend
    env_file: ./backend/.env
    restart: always
    volumes:
      - ./backend/src/db.sqlite3:/app/db.sqlite3
      - ./backend/src/resources/media:/app/resources/media
    networks:
      - blex-network
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: baealex/blex-nginx
    restart: always
    volumes:
      - ./backend/src/resources/media:/resources/media
    ports:
      - 20002:80
    depends_on:
      - backend
    networks:
      - blex-network

networks:
  blex-network:
    driver: bridge

volumes:
  postgres-data:
