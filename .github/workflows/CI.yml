name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  backend_ci:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Load .env file
      uses: xom9ikk/dotenv@v2.2.0
      with:
        path: samples

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      working-directory: backend/src

    - name: Test Backend
      run: |
        python manage.py test --verbosity 2
      working-directory: backend/src

  islands_ci:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js with pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9.0.0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19.0'
        cache: 'pnpm'
        cache-dependency-path: backend/islands/pnpm-lock.yaml

    - name: Install Islands dependencies
      run: pnpm install
      working-directory: backend/islands

    - name: Lint Islands
      run: pnpm lint
      working-directory: backend/islands

    - name: Type check Islands
      run: pnpm type-check
      working-directory: backend/islands

    - name: Build Islands
      run: pnpm run build
      working-directory: backend/islands

    - name: Check bootstrap entry budgets
      run: pnpm run check:entry-budgets
      working-directory: backend/islands

    - name: Set up Python for browser smoke
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies for browser smoke
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      working-directory: backend/src

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('backend/islands/pnpm-lock.yaml') }}

    - name: Install Playwright Chromium
      run: pnpm --filter @blex/remotes exec playwright install --with-deps chromium
      working-directory: backend/islands

    - name: Run island browser smoke
      run: pnpm run e2e:smoke
      working-directory: backend/islands
      env:
        BLEX_E2E_ENV_FILE: ${{ github.workspace }}/samples/.env
